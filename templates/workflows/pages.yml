name: Build H5 and Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Resolve @dcloudio version & install
        run: |
          set -euo pipefail
          npm config set registry https://registry.npmmirror.com

          DCLOUDIO_VER=$(npm view @dcloudio/vite-plugin-uni versions --json 2>/dev/null | \
            node -e "
            let raw = '';
            process.stdin.on('data', d => raw += d);
            process.stdin.on('end', () => {
              try {
                const vs = JSON.parse(raw);
                const dated = vs.filter(v => /^3\\.0\\.0-\\d{13,}$/.test(v));
                if (dated.length) {
                  dated.sort((a, b) => {
                    const na = BigInt(a.split('-')[1]);
                    const nb = BigInt(b.split('-')[1]);
                    return na < nb ? -1 : na > nb ? 1 : 0;
                  });
                  console.log(dated[dated.length - 1]);
                } else {
                  console.log('3.0.0-3090820231023001');
                }
              } catch(e) {
                console.log('3.0.0-3090820231023001');
              }
            });
            " || echo "3.0.0-3090820231023001")

          echo "📌 @dcloudio resolved: ${DCLOUDIO_VER}"

          node -e "
          const fs = require('fs');
          const ver = process.argv[1];
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          ['dependencies', 'devDependencies'].forEach(key => {
            if (!pkg[key]) return;
            Object.keys(pkg[key]).forEach(name => {
              if (name.startsWith('@dcloudio/') && name !== '@dcloudio/types') {
                pkg[key][name] = ver;
              }
            });
          });
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('✅ package.json @dcloudio pinned:', ver);
          " "${DCLOUDIO_VER}"

          pnpm install --no-frozen-lockfile

      - name: Ensure manifest.json is in src/
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "src/manifest.json" ]; then
            echo "✅ src/manifest.json exists"
          elif [ -f "manifest.json" ]; then
            mkdir -p src
            mv manifest.json src/manifest.json
            echo "✅ manifest.json moved to src/manifest.json"
          else
            echo "❌ manifest.json not found (root or src/)"
            exit 1
          fi

      - name: Set H5 base path in manifest.json (custom domain)
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST_PATH="src/manifest.json"

          node -e "
          const fs = require('fs');
          const p = process.argv[1];
          const m = JSON.parse(fs.readFileSync(p, 'utf8'));
          m.h5 = m.h5 || {};
          m.h5.router = m.h5.router || {};
          m.h5.router.base = '/';
          fs.writeFileSync(p, JSON.stringify(m, null, 2));
          console.log('✅ h5.router.base =', m.h5.router.base);
          " "${MANIFEST_PATH}"

      - name: Build H5
        run: |
          set -euo pipefail
          pnpm build:h5

      - name: Verify dist
        run: |
          set -euo pipefail
          DIST_DIR="dist/build/h5"
          if [ -d "${DIST_DIR}" ]; then
            echo "✅ ${DIST_DIR} exists"
            ls -lh "${DIST_DIR}/" || true
          else
            echo "❌ ${DIST_DIR} not found"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/build/h5

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
